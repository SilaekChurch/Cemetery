<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemetery Memorial System | คริสตจักรศิลาเอก</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* ป้องกันการ Scroll ซ้ำซ้อน */
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
        }

        /* ส่วนหัวของหน้าเว็บ (Header Bar) */
        .header-bar {
            background-color: #2c3e50; /* สีน้ำเงินเข้มดูน่าเชื่อถือ */
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .header-title {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* Container สำหรับเรียก Web App */
        .iframe-container {
            position: absolute;
            top: 50px; /* เว้นที่ให้ Header Bar */
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: calc(100% - 50px);
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loading Spinner กรณีเน็ตช้า */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1; /* อยู่หลัง iframe */
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="header-title">
            ⛪ SILAEK MEMORIAL SYSTEM
        </div>
        <div style="font-size: 0.8rem; opacity: 0.8;">
            ระบบจัดการผ่อนชำระสุสาน
        </div>
    </div>

    <div class="loader">
        <p>กำลังเชื่อมต่อฐานข้อมูลระบบสุสาน...</p>
    </div>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwV7GyCArIY2A85u1NXnqiw666iU_hKIrmKTDnDkZ8RstmNRtETuTxLBn3wFSCqghmT/exec" 
            allow="camera; geolocation; microphone; print;"
            title="Silaek Cemetery Management System">
        </iframe>
    </div>

    <script>
        // ป้องกันการกดย้อนกลับแล้วหน้าพังในบาง Browser
        window.onbeforeunload = function() {
            return "คุณกำลังจะออกจากระบบจัดการสุสาน?";
        };
    </script>
</body>
</html>
