<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .container-app { max-width: 800px; margin: 20px auto; padding: 15px; }
    .card-res { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; }
    .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    .header-box { background: #2c3e50; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
    .loader { display: none; margin: 20px 0; }
  </style>
</head>
<body>

<div class="container-app">
  <div class="header-box shadow">
    <h3 class="mb-0">⛪ SILAEK MEMORIAL SYSTEM</h3>
    <small>ระบบจัดการสุสานคริสตจักรศิลาเอก</small>
  </div>

  <div class="input-group input-group-lg mb-4 shadow-sm">
    <input type="text" id="searchInput" class="form-control" placeholder="พิมพ์ชื่อ-นามสกุล เพื่อตรวจสอบยอด...">
    <button class="btn btn-primary" onclick="searchData()">🔍 ค้นหา</button>
  </div>

  <div id="loader" class="text-center loader">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">กำลังเรียกข้อมูล...</p>
  </div>

  <div id="resultCard" class="card card-res bg-white p-4">
    <div class="row align-items-center mb-4">
      <div class="col-md-3 text-center">
        <img id="m_img" src="" class="rounded-circle shadow" style="width:120px; height:120px; object-fit:cover; border:3px solid #eee;">
      </div>
      <div class="col-md-9">
        <h2 id="m_name" class="fw-bold mb-1"></h2>
        <p class="text-muted mb-2">ID: <span id="m_id"></span> | <span id="m_status" class="badge bg-success status-badge"></span></p>
        <div class="row g-2">
          <div class="col-6">
            <div class="p-2 border rounded bg-light">
              <small class="text-muted d-block">ยอดสัญญา</small>
              <span id="m_total" class="fw-bold"></span> บาท
            </div>
          </div>
          <div class="col-6 text-danger">
            <div class="p-2 border rounded bg-danger bg-opacity-10 border-danger">
              <small class="d-block text-danger">ยอดคงเหลือ</small>
              <span id="m_remain" class="fw-bold"></span> บาท
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="transferAlert" class="alert alert-info py-2" style="display:none; font-size: 0.85rem;">
       ℹ️ ข้อมูลนี้รวมยอดผ่อนต่อเนื่องจากเจ้าของสิทธิ์เดิม (ID: <span id="m_prev"></span>)
    </div>

    <h6 class="fw-bold mt-3">📜 ประวัติการชำระเงิน</h6>
    <div class="table-responsive">
      <table class="table table-sm table-hover mt-2">
        <thead class="table-light">
          <tr>
            <th>งวด</th>
            <th>วันที่</th>
            <th>ยอดเงิน</th>
            <th>ผู้รับ</th>
          </tr>
        </thead>
        <tbody id="pay_rows"></tbody>
        <tfoot class="table-group-divider">
          <tr class="table-success fw-bold">
            <td colspan="2" class="text-end">รวมชำระแล้ว:</td>
            <td colspan="2"><span id="m_paid"></span> บาท</td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="mt-2 p-2 bg-light border rounded" style="font-size:0.85rem;">
      <strong>หมายเหตุ:</strong> <span id="m_notes"></span>
    </div>

    <button class="btn btn-outline-dark w-100 mt-4" onclick="window.print()">🖨️ พิมพ์ใบสรุปยอด (PDF)</button>
  </div>
</div>

<script>
  function searchData() {
    const val = document.getElementById('searchInput').value;
    if(!val) return;

    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('loader').style.display = 'block';

    google.script.run.withSuccessHandler(drawUI).getMemberFullReport(val);
  }

  function drawUI(res) {
    document.getElementById('loader').style.display = 'none';
    if(!res) return alert('❌ ไม่พบข้อมูลสมาชิกท่านนี้');
    if(res.error) return alert('Error: ' + res.error);

    const p = res.profile;
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('m_name').innerText = p.raw_name;
    document.getElementById('m_id').innerText = p.raw_id;
    document.getElementById('m_status').innerText = p.raw_status;
    document.getElementById('m_total').innerText = Number(p.raw_total).toLocaleString();
    document.getElementById('m_paid').innerText = res.summary.totalPaid.toLocaleString();
    document.getElementById('m_remain').innerText = res.summary.remaining.toLocaleString();
    document.getElementById('m_notes').innerText = p.raw_notes || '-';
    document.getElementById('m_img').src = p.raw_img || 'https://via.placeholder.com/150';

    if(p.raw_prev && p.raw_prev !== "-" && p.raw_prev !== "") {
      document.getElementById('transferAlert').style.display = 'block';
      document.getElementById('m_prev').innerText = p.raw_prev;
    } else {
      document.getElementById('transferAlert').style.display = 'none';
    }

    let rows = "";
    res.payments.forEach(item => {
      let d = new Date(item.date).toLocaleDateString('th-TH');
      rows += `<tr class="${item.isFromPrev ? 'table-warning' : ''}">
        <td>${item.no}</td>
        <td>${d}</td>
        <td class="fw-bold">${item.amount.toLocaleString()}</td>
        <td><small>${item.by}</small></td>
      </tr>`;
    });
    document.getElementById('pay_rows').innerHTML = rows;
  }
</script>
</body>
</html>
